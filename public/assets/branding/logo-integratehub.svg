<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0868b4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065a9a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" />
  
  <!-- Subtle inner ring -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
  
  <!-- Connection nodes - representing integrations/automation -->
  <!-- Top node -->
  <circle cx="200" cy="105" r="12" fill="url(#accentGrad)" />
  <!-- Bottom-left node -->
  <circle cx="130" cy="260" r="12" fill="url(#accentGrad)" />
  <!-- Bottom-right node -->
  <circle cx="270" cy="260" r="12" fill="url(#accentGrad)" />
  
  <!-- Connection lines between nodes -->
  <line x1="200" y1="105" x2="130" y2="260" stroke="rgba(79,195,247,0.4)" stroke-width="2" stroke-linecap="round" />
  <line x1="200" y1="105" x2="270" y2="260" stroke="rgba(79,195,247,0.4)" stroke-width="2" stroke-linecap="round" />
  <line x1="130" y1="260" x2="270" y2="260" stroke="rgba(79,195,247,0.4)" stroke-width="2" stroke-linecap="round" />
  
  <!-- IH Letters - bold, centered -->
  <text x="200" y="210" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" font-size="100" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">IH</text>
  
</svg>
